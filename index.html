<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐羅亞紀元遊戲資料庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        :root {
            --parchment: #f4e4bc;
            --border-brown: #5d4037;
            --accent-gold: #c5a059;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background: #2c1e14;
            color: #3e2723;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .parchment-bg {
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        /* 全新的海洋/虛空背景 */
        .ocean-bg {
            background-color: #17202A;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(197, 160, 89, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 80px 80px, 80px 80px;
        }

        .rpg-card {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid var(--border-brown);
            border-radius: 8px;
            padding: 1rem;
            position: relative;
        }

        #map-container {
            cursor: grab;
            transform-origin: center;
        }
        #map-container:active { cursor: grabbing; }
        
        .smooth-transform {
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* SVG 輪廓的轉場動畫 */
        .map-shape-transition {
            transition: d 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }

        .map-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .map-marker:hover { scale: 1.2; z-index: 20; }
        .map-marker.marker-active { scale: 1.35; z-index: 30; }

        .marker-icon {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(0,0,0,0.25);
            transition: all 0.3s;
        }
        
        .icon-town { border-radius: 50%; background: #3b82f6; } 
        .icon-wild { transform: rotate(45deg); background: #22c55e; }
        .icon-dungeon { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: #ef4444; }

        .map-marker:hover .marker-icon { box-shadow: 0 0 10px gold; }
        .map-marker.marker-active .marker-icon {
            box-shadow: 0 0 20px 8px rgba(255, 215, 0, 0.8);
            border-color: #ffeb3b;
        }

        .marker-label {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: #2c1e14;
            color: #f4e4bc;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            border: 1px solid #c5a059;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        
        .marker-label::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 4px;
            border-style: solid;
            border-color: #c5a059 transparent transparent transparent;
        }

        .map-marker:hover .marker-label,
        .map-marker.marker-active .marker-label {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .region-btn {
            background: rgba(244, 228, 188, 0.8);
            border: 2px solid var(--border-brown);
            color: var(--border-brown);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.875rem;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .region-btn.active {
            background: var(--border-brown);
            color: var(--parchment);
            box-shadow: 0 0 12px rgba(197, 160, 89, 0.8);
            transform: translateY(-2px);
        }
        .region-btn:hover:not(.active) {
            background: rgba(197, 160, 89, 0.4);
        }

        select:disabled {
            background-color: rgba(255, 255, 255, 0.2);
            color: #8d6e63;
            cursor: not-allowed;
            border-color: rgba(93, 64, 55, 0.3);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-brown); border-radius: 4px; }

        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .sidebar { height: auto !important; max-height: none !important; }
            .map-frame { height: 500px !important; }
            #region-selector { flex-wrap: wrap; justify-content: center; }
            .region-btn { font-size: 0.75rem; padding: 0.3rem 0.6rem; }
        }
    </style>
</head>
<body>

<div class="flex flex-col md:flex-row h-full w-full">
    <!-- 左側側邊欄 (與原版相同) -->
    <aside class="sidebar w-full md:w-[420px] parchment-bg border-r-4 border-[#3e2723] flex flex-col z-20 relative shadow-2xl">
        <div class="flex-1 overflow-y-auto p-4 flex flex-col h-full">
            <h1 class="text-2xl font-bold text-center mb-6 border-b-2 border-[#5d4037] pb-2">歐羅亞紀元<br><span class="text-lg tracking-widest">遊戲資料庫</span></h1>

            <div class="space-y-3 mb-4">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜尋當前區域的地點、魔物..." class="w-full bg-white/50 border-2 border-[#5d4037] rounded-full py-2 px-10 focus:outline-none focus:ring-2 ring-[#c5a059]">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-5 h-5 opacity-60"></i>
                </div>

                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-[#5d4037] whitespace-nowrap">分類篩選：</label>
                    <select id="mapCategory" class="flex-1 bg-white/50 border border-[#5d4037] rounded p-1 text-sm font-bold">
                        <option value="all">顯示所有圖誌</option>
                        <option value="town">城鎮 / 村莊</option>
                        <option value="wild">野外探索區</option>
                        <option value="dungeon">副本地圖</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="text-xs font-bold text-[#5d4037] block mb-1">快速跳轉地點 (當前區域)：</label>
                <select id="locationSelect" class="w-full bg-white/60 border-2 border-[#5d4037] rounded p-2 font-bold text-sm shadow-sm cursor-pointer">
                    <option value="">-- 請選擇地點 --</option>
                </select>
            </div>

            <div id="infoBox" class="rpg-card mb-4 hidden animate-in fade-in duration-500">
                <h3 id="infoTitle" class="text-xl font-bold text-[#5d4037] mb-1">地點名稱</h3>
                <p id="infoZone" class="text-[10px] text-gray-700 mb-2 font-bold uppercase tracking-tighter bg-[#c5a059]/30 inline-block px-2 py-0.5 rounded"></p>
                <p id="infoDesc" class="text-sm italic mb-3 leading-relaxed">地點簡介...</p>
                <div class="text-xs space-y-2 border-t border-[#5d4037]/20 pt-3">
                    <p><strong>著名地標：</strong> <span id="infoLandmarks" class="text-[#8d6e63]">無</span></p>
                    <p><strong>主要 NPC：</strong> <span id="infoNPCs" class="text-blue-800 font-bold">無</span></p>
                    <p><strong>出現魔物：</strong> <span id="infoMobs" class="text-red-800 font-bold">無</span></p>
                </div>
            </div>

            <!-- 即時環境模擬系統 (原版) -->
            <div class="rpg-card mb-4 border-[#c5a059] bg-[#fdfaf2]">
                <h4 class="font-bold mb-3 flex items-center gap-2 text-sm text-[#5d4037] border-b border-[#5d4037]/20 pb-2">
                    <i data-lucide="sun-moon" class="w-5 h-5"></i> 環境模擬
                </h4>
                <div class="space-y-2 mb-3 bg-[#5d4037]/5 p-2 rounded border border-[#5d4037]/20">
                    <select id="simMode" class="w-full text-xs bg-white/90 border border-[#5d4037] p-1.5 rounded font-bold text-[#5d4037] cursor-pointer shadow-sm">
                        <option value="auto">🕒 系統時間同步 (自動)</option>
                        <option value="manual">⚙️ 手動覆寫環境 (手動)</option>
                    </select>
                    <div class="flex gap-2">
                        <select id="simPeriod" disabled class="flex-1 text-xs bg-white border border-[#5d4037] p-1.5 rounded font-bold">
                            <option value="morning">早晨</option>
                            <option value="afternoon">下午</option>
                            <option value="night">夜晚</option>
                            <option value="dawn">凌晨</option>
                        </select>
                        <select id="simWeather" disabled class="flex-1 text-xs bg-white border border-[#5d4037] p-1.5 rounded font-bold">
                            <option value="sunny">☀️ 晴朗</option>
                            <option value="cloudy">☁️ 微雲</option>
                            <option value="mist">🌫️ 魔素霧</option>
                            <option value="rain">⛈️ 雷雨</option>
                            <option value="turbulence">🌪️ 魔素紊亂</option>
                        </select>
                    </div>
                </div>
                <div class="text-xs space-y-2 text-[#3e2723]">
                    <div class="flex justify-between items-center bg-[#5d4037] text-[#f4e4bc] px-3 py-1.5 rounded shadow-inner">
                        <span class="font-bold tracking-wider">時間: <span id="dispTime" class="text-[#c5a059] text-sm ml-1">08:00</span></span>
                        <span><span id="dispSeason">春季</span> | <span id="dispPeriod">早晨</span> | <span id="dispWeather">晴朗</span></span>
                    </div>
                    <div class="border-t border-[#5d4037]/20 pt-2 mt-2">
                        <p class="font-bold text-[#5d4037] mb-1 flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> 觀測地：<span id="dispLocation" class="text-blue-800 text-[13px]">歐羅亞大陸全境</span>
                        </p>
                        <div class="bg-white/60 p-2.5 rounded space-y-2 border border-[#5d4037]/20 shadow-sm leading-relaxed">
                            <p class="flex items-start gap-1.5"><i data-lucide="activity" class="w-4 h-4 text-green-700 shrink-0 mt-0.5"></i><span><strong class="text-green-800">動態：</strong> <span id="dispActivity">各地依照自然規律運作中。</span></span></p>
                            <p class="flex items-start gap-1.5 border-t border-[#5d4037]/10 pt-2"><i data-lucide="message-square" class="w-4 h-4 text-purple-700 shrink-0 mt-0.5"></i><span><strong class="text-purple-800">反應：</strong> <span id="dispReaction">平民：『願英雄莉希妲護佑我們。』</span></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 縮放控制 -->
            <div class="mt-auto pt-4 border-t border-[#5d4037]/20">
                <div class="flex justify-between text-[10px] font-bold mb-1 text-[#5d4037]">
                    <span>地圖縮放倍率</span>
                    <span id="zoomVal">100%</span>
                </div>
                <input type="range" id="zoomRange" min="0.3" max="3" step="0.1" value="0.8" class="w-full accent-[#5d4037] cursor-pointer">
                <button id="resetMap" class="w-full mt-2 bg-[#5d4037] text-[#f4e4bc] py-1 rounded text-xs hover:bg-[#3e2723] transition flex items-center justify-center gap-2 font-bold cursor-pointer">
                    <i data-lucide="maximize" class="w-3 h-3"></i> 重置全圖視野
                </button>
            </div>
        </div>
    </aside>

    <!-- 右側地圖框架 (海洋背景) -->
    <main class="flex-1 relative overflow-hidden ocean-bg map-frame">
        <!-- 復古羅盤裝飾 -->
        <div class="absolute top-6 left-6 opacity-30 pointer-events-none z-10">
            <i data-lucide="compass" class="w-24 h-24 text-[#c5a059]"></i>
        </div>

        <div id="map-viewport" class="w-full h-full relative overflow-hidden flex items-center justify-center">
            <div id="map-container">
                <!-- 取消了滿版背景，改用邊界容器 -->
                <div id="map-bounds" class="relative w-[1600px] h-[1200px]">
                    
                    <!-- SVG 島嶼生成器 -->
                    <svg id="map-svg" width="1600" height="1200" class="absolute inset-0 z-0 drop-shadow-2xl overflow-visible">
                        <defs>
                            <!-- 羊皮紙材質填充 -->
                            <pattern id="parchment-pattern" patternUnits="userSpaceOnUse" width="512" height="512">
                                <rect width="512" height="512" fill="#f4e4bc" />
                                <image href="https://www.transparenttextures.com/patterns/paper-fibers.png" x="0" y="0" width="512" height="512" />
                            </pattern>
                            <!-- 淺灘海岸線發光濾鏡 -->
                            <filter id="shallow-water" x="-10%" y="-10%" width="120%" height="120%">
                                <feGaussianBlur stdDeviation="12" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                            </filter>
                        </defs>

                        <!-- 地圖群組 (控制切換淡入淡出) -->
                        <g id="svg-group" class="transition-opacity duration-300">
                            <!-- 淺水邊界層 -->
                            <path id="landmass-outline" class="map-shape-transition" d="" fill="none" stroke="#c5a059" stroke-width="35" stroke-linejoin="round" opacity="0.3" filter="url(#shallow-water)"/>
                            
                            <!-- 主要島嶼陸地層 -->
                            <path id="landmass" class="map-shape-transition" d="" fill="url(#parchment-pattern)" stroke="#5d4037" stroke-width="8" stroke-linejoin="round"/>
                            
                            <!-- 內嵌於SVG的大型浮水印 (會隨島嶼範圍裁切或顯示) -->
                            <text id="watermark-line1" x="800" y="600" text-anchor="middle" dominant-baseline="middle" fill="#5d4037" opacity="0.12" font-size="140" font-weight="bold" font-style="italic" letter-spacing="30">OROEA</text>
                            <text id="watermark-line2" x="800" y="740" text-anchor="middle" dominant-baseline="middle" fill="#5d4037" opacity="0.12" font-size="70" font-weight="bold" font-style="italic" letter-spacing="50">CONTINENT</text>
                        </g>
                    </svg>

                    <!-- 圖標層疊加於 SVG 之上 -->
                    <div id="markers-layer" class="absolute inset-0 z-10"></div>
                </div>
            </div>
        </div>
        
        <div class="absolute top-4 right-4 bg-black/70 text-white p-3 rounded-lg border border-white/20 text-[10px] space-y-2 backdrop-blur-sm z-20 shadow-xl">
            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-blue-500 border border-white"></div> 城鎮 / 村莊</div>
            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-green-500 border border-white rotate-45"></div> 野外探索區</div>
            <div class="flex items-center gap-2"><div class="w-3 h-3 bg-red-500 border border-white" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);"></div> 特殊副本</div>
        </div>

        <div id="region-selector" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-3 z-30 shadow-2xl bg-black/50 p-2.5 rounded-2xl backdrop-blur-md border border-white/20">
            <button class="region-btn active" data-region="mainland">歐羅亞大陸</button>
            <button class="region-btn" data-region="sali">薩利島</button>
            <button class="region-btn" data-region="shamei">莎梅群島</button>
            <button class="region-btn" data-region="maha">瑪哈島</button>
        </div>

        <div class="absolute bottom-4 right-4 space-y-2 z-20 pointer-events-none">
            <div class="bg-black/70 text-[#f4e4bc] p-2 rounded backdrop-blur-md border border-[#c5a059]/40 text-[10px] font-mono">
                <p>經緯座標: <span id="coords">0, 0</span></p>
                <p>空域監測: <span id="hoverArea">正常</span></p>
            </div>
        </div>
    </main>
</div>

<script>
    // 各地區地形 SVG Path 定義 (支援 1600x1200 解析度)
    // 利用 SVG 的 Path 繪製出具有邊界感的大陸與島嶼
    const regionConfig = {
        mainland: { 
            name: '歐羅亞大陸', watermark1: 'OROEA', watermark2: 'CONTINENT',
            path: 'M 60,60 C 500,-40 1000,120 1400,60 C 1600,150 1500,600 1550,1000 C 1500,1200 1000,1100 600,1150 C 100,1200 50,800 60,600 C 80,300 -50,150 60,60 Z'

        sali: { 
            name: '薩利島', watermark1: 'SALI', watermark2: 'ISLAND',

        shamei: {

        },

            name: '瑪哈島', watermark1: 'MAHA', watermark2: 'ISLAND',
            path: 'M 450,100 C 750,50 850,200 750,350 C 700,450 800,450 950,450 C 1150,450 1200,550 1150,750 C 1050,900 750,850 550,800 C 400,750 400,600 450,500 C 500,400 350,200 450,100 Z'
        }
    };

    const gameData = {
        locations:[
            // 歐羅亞大陸
            { region: 'mainland', id: 'elysia', name: '聖都艾莉西亞', type: 'town', pos: { x: 1300, y: 950 }, zone: '東南 - 奧蘭多王國', desc: '奧蘭多王國的首都。' },
            { region: 'mainland', id: 'baibo', name: '白波鎮', type: 'town', pos: { x: 1050, y: 1100 }, zone: '南方 - 奧蘭多沿海', desc: '奧蘭多南方觀光小鎮。' },
            { region: 'mainland', id: 'hilomel', name: '希洛梅爾', type: 'town', pos: { x: 300, y: 1000 }, zone: '西南 - 精靈領', desc: '精靈族的主要領地。' },
            { region: 'mainland', id: 'northborn', name: '自由城諾斯本', type: 'town', pos: { x: 800, y: 650 }, zone: '中部 - 斯潘德家族', desc: '經貿中心中立城市。' },
            { region: 'mainland', id: 'yaoshi', name: '曜石鎮', type: 'town', pos: { x: 250, y: 600 }, zone: '西部 - 礦山區', desc: '內陸礦業重鎮。' },
            { region: 'mainland', id: 'batiga', name: '巴提加', type: 'town', pos: { x: 1350, y: 250 }, zone: '東北 - 拉貝恩聯邦', desc: '獸耳族聯邦拉貝恩的王城。' },
            { region: 'mainland', id: 'guta', name: '古塔村', type: 'town', pos: { x: 300, y: 250 }, zone: '西北 - 險要山脈', desc: '龍族後裔活動的山村。' },
            { region: 'mainland', id: 'yuhui', name: '餘暉平原', type: 'wild', pos: { x: 1100, y: 950 }, zone: '初級狩獵區', desc: '聖都西郊。' },
            { region: 'mainland', id: 'cloudgap', name: '雲迷峽谷', type: 'wild', pos: { x: 650, y: 450 }, zone: '上級狩獵區', desc: '諾斯本西北方。' },
            { region: 'mainland', id: 'stonegate', name: '尖石禁地', type: 'dungeon', pos: { x: 100, y: 450 }, zone: '特殊副本', desc: '巨石荒原深處。' },
            { region: 'mainland', id: 'chaosroad', name: '焚毀的無盡之路', type: 'dungeon', pos: { x: 500, y: 400 }, zone: '極秘副本', desc: '封印史詩魔物的古戰場。' },

            // 薩利島
            { region: 'sali', id: 'lude', name: '盧德鎮', type: 'town', pos: { x: 800, y: 500 }, zone: '薩利島', desc: '民風淳樸的漁夫小鎮。' },
            { region: 'sali', id: 'windglass', name: '風璃丘陵', type: 'wild', pos: { x: 800, y: 700 }, zone: '初級狩獵區', desc: '薩利島中部。' },
            
            // 莎梅群島
            { region: 'shamei', id: 'harasha', name: '哈勒沙', type: 'town', pos: { x: 800, y: 600 }, zone: '莎梅群島', desc: '魅魔族熱帶島國首都。' },
            { region: 'shamei', id: 'pearlcoast', name: '珍珠海岸', type: 'wild', pos: { x: 800, y: 400 }, zone: '初級狩獵區', desc: '哈勒沙北岸。' },
            { region: 'shamei', id: 'twilight', name: '暮色沼澤', type: 'wild', pos: { x: 800, y: 900 }, zone: '中級狩獵區', desc: '莎梅的南島。' },
            { region: 'shamei', id: 'illusionforest', name: '幻惑秘林', type: 'dungeon', pos: { x: 800, y: 200 }, zone: '特殊副本', desc: '莎梅北島。' },

            // 瑪哈島
            { region: 'maha', id: 'kaliba', name: '卡利巴', type: 'town', pos: { x: 600, y: 600 }, zone: '瑪哈島', desc: '魔族溫卡爾帝國王城。' },
            { region: 'maha', id: 'redroad', name: '紅蓮山道', type: 'wild', pos: { x: 600, y: 400 }, zone: '中級狩獵區', desc: '卡利巴北郊。' },
            { region: 'maha', id: 'kasan', name: '卡桑高地', type: 'wild', pos: { x: 1000, y: 600 }, zone: '上級狩獵區', desc: '卡利巴東方。' },
            { region: 'maha', id: 'redmt', name: '赤焰山', type: 'wild', pos: { x: 600, y: 200 }, zone: '上級狩獵區', desc: '紅蓮山道北峰。' }
        ]
    };

    let state = {
        currentRegion: 'mainland', zoom: 0.6, offsetX: 0, offsetY: 0, isDragging: false, lastMousePos: { x: 0, y: 0 }
    };

    window.onload = () => {
        lucide.createIcons();
        initSVGRegion('mainland');
        setupEvents();
        applyFilter();
        resetMap();
    };

    // 套用區域的 SVG 形狀與浮水印設定
    function initSVGRegion(regionId) {
        const config = regionConfig[regionId];
        const svgGroup = document.getElementById('svg-group');
        
        // 為了避免複雜多邊形 Morphing 扭曲過於突兀，增加一個快速透明過渡
        svgGroup.style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('landmass').setAttribute('d', config.path);
            document.getElementById('landmass-outline').setAttribute('d', config.path);
            document.getElementById('watermark-line1').textContent = config.watermark1;
            document.getElementById('watermark-line2').textContent = config.watermark2;
            svgGroup.style.opacity = '1';
        }, 150);
    }

    function switchRegion(regionId) {
        if(state.currentRegion === regionId) return;
        state.currentRegion = regionId;
        
        document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.region-btn[data-region="${regionId}"]`).classList.add('active');
        
        initSVGRegion(regionId);
        
        document.getElementById('locationSelect').value = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('infoBox').classList.add('hidden');
        
        applyFilter();
        resetMap();
    }

    function applyFilter() {
        const category = document.getElementById('mapCategory').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = gameData.locations.filter(loc => {
            return loc.region === state.currentRegion && 
                   (category === 'all' || loc.type === category) &&
                   (loc.name.includes(searchTerm) || loc.desc.includes(searchTerm));
        });

        const select = document.getElementById('locationSelect');
        select.innerHTML = '<option value="">-- 請選擇地點 --</option>';
        filtered.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc.id;
            opt.textContent = `${loc.type === 'town' ? '🏠' : loc.type === 'wild' ? '🌲' : '💀'} ${loc.name}`;
            select.appendChild(opt);
        });

        renderMarkers(filtered);
    }

    function renderMarkers(locations) {
        const layer = document.getElementById('markers-layer');
        const currentSelectedId = document.getElementById('locationSelect').value;
        layer.innerHTML = '';
        locations.forEach(loc => {
            const marker = document.createElement('div');
            marker.className = `map-marker ${loc.id === currentSelectedId ? 'marker-active' : ''}`;
            marker.setAttribute('data-id', loc.id);
            marker.style.left = `${loc.pos.x}px`;
            marker.style.top = `${loc.pos.y}px`;
            const typeClass = loc.type === 'town' ? 'icon-town' : loc.type === 'wild' ? 'icon-wild' : 'icon-dungeon';
            marker.innerHTML = `<div class="marker-label">${loc.name}</div><div class="marker-icon ${typeClass}"></div>`;
            marker.onclick = (e) => { e.stopPropagation(); selectLocation(loc.id); };
            layer.appendChild(marker);
        });
    }

    function selectLocation(id) {
        const loc = gameData.locations.find(l => l.id === id);
        if (!loc) return;
        document.getElementById('infoBox').classList.remove('hidden');
        document.getElementById('infoTitle').textContent = loc.name;
        document.getElementById('infoZone').textContent = loc.zone;
        document.getElementById('infoDesc').textContent = loc.desc;
        document.getElementById('locationSelect').value = id;
        
        document.querySelectorAll('.map-marker').forEach(m => m.classList.remove('marker-active'));
        document.querySelector(`.map-marker[data-id="${id}"]`).classList.add('marker-active');
        focusOn(loc.pos.x, loc.pos.y, 1.5, true);
    }

    function focusOn(x, y, targetZoom, smooth = false) {
        const vp = document.getElementById('map-viewport');
        if (targetZoom) { state.zoom = targetZoom; document.getElementById('zoomRange').value = targetZoom; }
        state.offsetX = (vp.offsetWidth / 2) - (x * state.zoom);
        state.offsetY = (vp.offsetHeight / 2) - (y * state.zoom);
        updateTransform(smooth);
    }

    function updateTransform(smooth = false) {
        const container = document.getElementById('map-container');
        smooth ? container.classList.add('smooth-transform') : container.classList.remove('smooth-transform');
        container.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.zoom})`;
        document.getElementById('zoomVal').textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function resetMap() {
        state.zoom = 0.65;
        state.offsetX = 0; state.offsetY = 0;
        document.getElementById('zoomRange').value = state.zoom;
        updateTransform(true);
    }

    function setupEvents() {
        const vp = document.getElementById('map-viewport');

        vp.onmousedown = (e) => {
            state.isDragging = true;
            state.lastMousePos = { x: e.clientX, y: e.clientY };
        };
        
        window.onmousemove = (e) => {
            if (!state.isDragging) {
                const rect = document.getElementById('map-bounds').getBoundingClientRect();
                const x = Math.round((e.clientX - rect.left) / state.zoom);
                const y = Math.round((e.clientY - rect.top) / state.zoom);
                if (x >= 0 && x <= 1600 && y >= 0 && y <= 1200) {
                    document.getElementById('coords').textContent = `${x}, ${y}`;
                }
                return;
            }
            state.offsetX += (e.clientX - state.lastMousePos.x);
            state.offsetY += (e.clientY - state.lastMousePos.y);
            state.lastMousePos = { x: e.clientX, y: e.clientY };
            updateTransform(false);
        };
        
        window.onmouseup = () => state.isDragging = false;

        vp.onwheel = (e) => {
            e.preventDefault(); 
            let newZoom = state.zoom + (e.deltaY < 0 ? 0.1 : -0.1);
            newZoom = Math.max(0.3, Math.min(newZoom, 3));
            if (newZoom !== state.zoom) {
                const rect = vp.getBoundingClientRect();
                const vx = (e.clientX - rect.left) - rect.width / 2;
                const vy = (e.clientY - rect.top) - rect.height / 2;
                const ratio = newZoom / state.zoom;
                state.offsetX = vx - (vx - state.offsetX) * ratio;
                state.offsetY = vy - (vy - state.offsetY) * ratio;
                state.zoom = newZoom;
                document.getElementById('zoomRange').value = state.zoom;
                updateTransform(false);
            }
        };

        vp.ondblclick = (e) => {
            if (!e.target.closest('.map-marker')) {
                resetMap();
                document.getElementById('locationSelect').value = '';
                document.getElementById('infoBox').classList.add('hidden');
                document.querySelectorAll('.map-marker').forEach(m => m.classList.remove('marker-active'));
            }
        };

        document.querySelectorAll('.region-btn').forEach(btn => {
            btn.onclick = (e) => switchRegion(e.target.getAttribute('data-region'));
        });

        document.getElementById('mapCategory').onchange = applyFilter;
        document.getElementById('searchInput').oninput = applyFilter;
        document.getElementById('locationSelect').onchange = (e) => e.target.value ? selectLocation(e.target.value) : resetMap();
        document.getElementById('zoomRange').oninput = (e) => { state.zoom = parseFloat(e.target.value); updateTransform(false); };
        document.getElementById('resetMap').onclick = resetMap;
    }
</script>

</body>
</html>
